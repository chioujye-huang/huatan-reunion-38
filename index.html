<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花壇國中 三年八班 畢業33週年同學會</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap');

  :root {
    --gold: #D4A843;
    --gold-light: #F2D98D;
    --deep-navy: #1A1F3A;
    --warm-white: #FFF9F0;
    --accent-coral: #E8785A;
    --soft-green: #5B8C6E;
    --text-dark: #2C2C2C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--deep-navy);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }
  .bg-canvas .circle {
    position: absolute; border-radius: 50%; opacity: 0.08;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.08; }
    90%  { opacity: 0.08; }
    100% { transform: translateY(-20vh) scale(1); opacity: 0; }
  }

  /* ── Hero section ── */
  .hero {
    position: relative; z-index: 1;
    text-align: center;
    padding: 60px 20px 30px;
    background: linear-gradient(180deg, rgba(26,31,58,0) 0%, rgba(26,31,58,0.6) 100%);
  }
  .hero .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--deep-navy);
    font-weight: 700; font-size: 14px;
    padding: 6px 22px; border-radius: 30px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    animation: fadeDown 0.8s ease-out;
  }
  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    color: var(--warm-white);
    line-height: 1.3;
    margin-bottom: 8px;
    animation: fadeDown 1s ease-out 0.2s both;
  }
  .hero h1 .gold { color: var(--gold-light); }
  .hero .subtitle {
    font-size: clamp(15px, 3vw, 20px);
    color: rgba(255,255,255,0.6);
    font-weight: 300;
    margin-bottom: 24px;
    animation: fadeDown 1s ease-out 0.4s both;
  }
  .hero .year-badge {
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 60px; padding: 12px 32px;
    animation: fadeDown 1s ease-out 0.6s both;
  }
  .hero .year-badge .num {
    font-family: 'Noto Serif TC', serif;
    font-size: 42px; font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .year-badge .label {
    text-align: left; color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.5;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; padding: 20px 0;
    position: relative; z-index: 1;
  }
  .divider span {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider .diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* ── Info cards ── */
  .info-section {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 0 20px 20px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    animation: fadeDown 1s ease-out 0.8s both;
  }
  .info-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 20px;
    text-align: center;
    transition: transform 0.3s, border-color 0.3s;
  }
  .info-card:hover {
    transform: translateY(-3px);
    border-color: rgba(212,168,67,0.3);
  }
  .info-card .icon { font-size: 28px; margin-bottom: 8px; }
  .info-card .card-label {
    font-size: 12px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
  }
  .info-card .card-value {
    font-size: 16px; font-weight: 500; color: var(--warm-white);
  }

  /* ── Form ── */
  .form-wrapper {
    position: relative; z-index: 1;
    max-width: 560px; margin: 20px auto 60px;
    padding: 0 20px;
    animation: fadeDown 1s ease-out 1s both;
  }
  .form-container {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px 36px;
    backdrop-filter: blur(20px);
  }
  .form-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; font-weight: 700;
    color: var(--warm-white);
    text-align: center; margin-bottom: 6px;
  }
  .form-desc {
    text-align: center; font-size: 14px;
    color: rgba(255,255,255,0.45); margin-bottom: 32px;
  }

  .field { margin-bottom: 22px; }
  .field label {
    display: block; font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.6); margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .field label .req { color: var(--accent-coral); margin-left: 3px; }
  .field input, .field select {
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--warm-white);
    font-size: 16px; font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.25); }
  .field input:focus, .field select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,168,67,0.15);
  }
  .field select option { background: var(--deep-navy); color: var(--warm-white); }

  .field .hint {
    font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 6px;
  }

  .submit-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--gold), #C4943A);
    border: none; border-radius: 14px;
    color: var(--deep-navy);
    font-size: 17px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 10px;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212,168,67,0.35);
  }
  .submit-btn:active { transform: translateY(0); }

  /* ── Toast ── */
  .toast {
    position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
    z-index: 999;
    background: var(--soft-green); color: #fff;
    padding: 16px 32px; border-radius: 14px;
    font-size: 15px; font-weight: 500;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toast.show { top: 30px; }

  /* ── Footer ── */
  .footer {
    position: relative; z-index: 1;
    text-align: center; padding: 30px 20px 40px;
    font-size: 13px; color: rgba(255,255,255,0.25);
    line-height: 1.8;
  }
  .footer .heart { color: var(--accent-coral); }

  /* ── Responsive Mobile ── */
  @media (max-width: 640px) {
    body { -webkit-text-size-adjust: 100%; }

    .hero { padding: 36px 16px 20px; }
    .hero .badge { font-size: 12px; padding: 5px 16px; letter-spacing: 1px; }
    .hero h1 { font-size: 26px; line-height: 1.4; }
    .hero .subtitle { font-size: 14px; margin-bottom: 18px; }
    .hero .year-badge { padding: 10px 24px; gap: 10px; }
    .hero .year-badge .num { font-size: 34px; }
    .hero .year-badge .label { font-size: 12px; }

    .divider { padding: 14px 0; }

    .info-section {
      grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 16px 16px;
    }
    .info-card { padding: 14px 10px; border-radius: 12px; }
    .info-card .icon { font-size: 22px; margin-bottom: 4px; }
    .info-card .card-label { font-size: 10px; }
    .info-card .card-value { font-size: 13px; }

    .form-wrapper { padding: 0 16px; margin: 16px auto 40px; }
    .form-container { padding: 28px 20px; border-radius: 20px; }
    .form-title { font-size: 20px; }
    .form-desc { font-size: 13px; margin-bottom: 24px; }

    .field { margin-bottom: 18px; }
    .field label { font-size: 13px; }
    .field input, .field select {
      padding: 14px 16px; font-size: 16px;
      border-radius: 10px;
      -webkit-appearance: none;
    }
    .submit-btn {
      padding: 16px; font-size: 17px;
      border-radius: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:hover { transform: none; box-shadow: none; }
    .submit-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 15px rgba(212,168,67,0.3);
    }

    .toast {
      width: calc(100% - 32px); left: 16px; transform: none;
      text-align: center; font-size: 14px;
      padding: 14px 20px; border-radius: 12px;
    }
    .toast.show { top: 20px; }

    .music-toggle { top: 14px; right: 14px; width: 42px; height: 42px; }
    .music-label { top: 62px; right: 8px; font-size: 10px; }

    .footer { padding: 20px 16px 32px; font-size: 12px; }

    .bg-canvas .circle { opacity: 0.05; }
  }

  @media (max-width: 360px) {
    .hero h1 { font-size: 22px; }
    .info-section { grid-template-columns: 1fr; gap: 8px; }
    .info-card .card-value { font-size: 14px; }
    .form-container { padding: 24px 16px; }
  }

  /* ── Sparkle keyframes ── */
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }
  .sparkle {
    position: absolute; width: 4px; height: 4px;
    background: var(--gold-light); border-radius: 50%;
    animation: sparkle 2s ease-in-out infinite;
    z-index: 1;
  }

  /* ── Music player ── */
  .music-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(212,168,67,0.4);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s, transform 0.3s;
    backdrop-filter: blur(10px);
  }
  .music-toggle:hover {
    background: rgba(212,168,67,0.2);
    transform: scale(1.1);
  }
  .music-toggle .bars {
    display: flex; align-items: flex-end; gap: 3px; height: 18px;
  }
  .music-toggle .bar {
    width: 3px; background: var(--gold-light); border-radius: 2px;
    transition: height 0.3s;
  }
  .music-toggle.playing .bar {
    animation: barBounce 0.8s ease-in-out infinite alternate;
  }
  .music-toggle.playing .bar:nth-child(1) { animation-delay: 0s; }
  .music-toggle.playing .bar:nth-child(2) { animation-delay: 0.15s; }
  .music-toggle.playing .bar:nth-child(3) { animation-delay: 0.3s; }
  .music-toggle.playing .bar:nth-child(4) { animation-delay: 0.45s; }
  .music-toggle:not(.playing) .bar { height: 6px !important; opacity: 0.4; }

  @keyframes barBounce {
    0%   { height: 4px; }
    100% { height: 18px; }
  }

  .music-label {
    position: fixed; top: 74px; right: 12px; z-index: 100;
    font-size: 11px; color: rgba(255,255,255,0.35);
    text-align: center; pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
  }
  .music-label.show { opacity: 1; }

  /* ── Welcome overlay (for autoplay) ── */
  .welcome-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: radial-gradient(ellipse at center, #1e2544 0%, #0e1225 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s;
  }
  .welcome-overlay.hide {
    opacity: 0; visibility: hidden; pointer-events: none;
  }
  .welcome-overlay .welcome-badge {
    font-size: 13px; color: var(--gold);
    letter-spacing: 3px; margin-bottom: 20px;
    opacity: 0; animation: fadeDown 1s ease-out 0.3s both;
  }
  .welcome-overlay .welcome-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(26px, 6vw, 48px);
    font-weight: 900; color: var(--warm-white);
    text-align: center; line-height: 1.4;
    margin-bottom: 12px;
    opacity: 0; animation: fadeDown 1s ease-out 0.6s both;
  }
  .welcome-overlay .welcome-title .gold { color: var(--gold-light); }
  .welcome-overlay .welcome-sub {
    font-size: clamp(14px, 3vw, 18px);
    color: rgba(255,255,255,0.5); margin-bottom: 40px;
    opacity: 0; animation: fadeDown 1s ease-out 0.9s both;
  }
  .welcome-overlay .enter-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--deep-navy);
    border: none; border-radius: 50px;
    padding: 16px 48px;
    font-size: 17px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; letter-spacing: 2px;
    opacity: 0; animation: fadeDown 1s ease-out 1.2s both;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .welcome-overlay .enter-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(212,168,67,0.4);
  }
  .welcome-overlay .enter-hint {
    margin-top: 16px; font-size: 12px;
    color: rgba(255,255,255,0.25);
    opacity: 0; animation: fadeDown 1s ease-out 1.5s both;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(212,168,67,0); }
  }
  .welcome-overlay .enter-btn { animation: fadeDown 1s ease-out 1.2s both, pulse 2s ease-in-out 2.5s infinite; }
</style>
</head>
<body>

<!-- Welcome Overlay -->
<div class="welcome-overlay" id="welcomeOverlay" onclick="enterSite()">
  <div class="welcome-badge">花壇國中 三年八班</div>
  <div class="welcome-title">那些年，<span class="gold">我們一起</span><br>走過的青春</div>
  <div class="welcome-sub">畢業 33 週年同學會</div>
  <button class="enter-btn" onclick="enterSite()">進入報名</button>
  <div class="enter-hint">點擊後將自動播放音樂</div>
</div>

<!-- Background Music -->
<audio id="bgMusic" loop preload="auto">
  <source src="./bgm.mp3" type="audio/mpeg">
</audio>

<!-- Music Toggle Button -->
<button class="music-toggle" id="musicBtn" onclick="toggleMusic()" title="播放/暫停音樂">
  <div class="bars">
    <div class="bar" style="height:8px"></div>
    <div class="bar" style="height:14px"></div>
    <div class="bar" style="height:10px"></div>
    <div class="bar" style="height:16px"></div>
  </div>
</button>
<div class="music-label" id="musicLabel">播放中</div>

<!-- Animated background -->
<div class="bg-canvas" id="bgCanvas"></div>

<!-- Sparkles -->
<div class="sparkle" style="top:12%;left:10%;animation-delay:0s"></div>
<div class="sparkle" style="top:8%;left:85%;animation-delay:0.7s"></div>
<div class="sparkle" style="top:25%;left:92%;animation-delay:1.4s"></div>
<div class="sparkle" style="top:40%;left:5%;animation-delay:0.3s"></div>
<div class="sparkle" style="top:65%;left:88%;animation-delay:1.1s"></div>
<div class="sparkle" style="top:80%;left:15%;animation-delay:1.8s"></div>

<!-- Hero -->
<section class="hero">
  <div class="badge">花壇國中 三年八班</div>
  <h1>那些年，<span class="gold">我們一起</span><br>走過的青春</h1>
  <p class="subtitle">畢業 33 週年同學會 — 再聚首，憶當年</p>
  <div class="year-badge">
    <div class="num">33</div>
    <div class="label">週年<br><strong style="color:var(--gold-light)">1993 → 2026</strong></div>
  </div>
</section>

<div class="divider">
  <span></span><div class="diamond"></div><span></span>
</div>

<!-- Info Cards -->
<section class="info-section">
  <div class="info-card">
    <div class="icon">📅</div>
    <div class="card-label">日期</div>
    <div class="card-value">日期未定（届時通知）</div>
  </div>
  <div class="info-card">
    <div class="icon">⏰</div>
    <div class="card-label">時間</div>
    <div class="card-value">下午 5:00 入場</div>
  </div>
  <div class="info-card">
    <div class="icon">📍</div>
    <div class="card-label">地點</div>
    <div class="card-value">保密（届時通知）</div>
  </div>
  <div class="info-card">
    <div class="icon">💰</div>
    <div class="card-label">費用</div>
    <div class="card-value">每人 NT$800</div>
  </div>
</section>

<div class="divider">
  <span></span><div class="diamond"></div><span></span>
</div>

<!-- Registration Form -->
<div class="form-wrapper">
  <div class="form-container">
    <h2 class="form-title">同學會報名表</h2>
    <p class="form-desc">期待與你重逢，請填寫以下資訊完成報名</p>

    <form id="reunionForm" onsubmit="return handleSubmit(event)">
      <div class="field">
        <label>姓名<span class="req">*</span></label>
        <input type="text" id="name" placeholder="請輸入您的姓名" required>
      </div>

      <div class="field">
        <label>參加人數<span class="req">*</span></label>
        <select id="attendees" required>
          <option value="" disabled selected>請選擇參加人數</option>
          <option value="1">1 人（本人）</option>
          <option value="2">2 人（含眷屬/朋友）</option>
          <option value="3">3 人</option>
          <option value="4">4 人</option>
          <option value="5">5 人</option>
          <option value="6">6 人以上</option>
        </select>
        <p class="hint">可攜伴參加，費用依人數計算</p>
      </div>

      <div class="field">
        <label>聯絡電話<span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="例：0912-345-678" required
               pattern="[0-9\-]{8,15}">
        <p class="hint">僅供活動聯繫使用，不會公開</p>
      </div>

      <div class="field">
        <label>備註（選填）</label>
        <input type="text" id="note" placeholder="素食需求、過敏等特殊需求">
      </div>

      <button type="submit" class="submit-btn">確認報名</button>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<div class="footer">
  花壇國中 三年八班 畢業 33 週年同學會<br>
  用 <span class="heart">&#10084;</span> 串起三十三年的回憶
</div>

<script>
  // ── Background circles ──
  const canvas = document.getElementById('bgCanvas');
  const colors = ['#D4A843', '#E8785A', '#5B8C6E', '#7B8EC9', '#C77DB5'];
  for (let i = 0; i < 18; i++) {
    const c = document.createElement('div');
    c.classList.add('circle');
    const size = Math.random() * 200 + 60;
    c.style.width = size + 'px';
    c.style.height = size + 'px';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (Math.random() * 15 + 12) + 's';
    c.style.animationDelay = (Math.random() * 10) + 's';
    canvas.appendChild(c);
  }

  // ── Google Sheets API ──
  // ★★★ 請將下方網址替換為你的 Google Apps Script 部署網址 ★★★
  const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9g7J0P8-lQwEGyAg_3Xxxdyk6jAN4Cn-KfoO3mGtym8kvykouUeoeN5ocf9zX94FY/exec';

  // ── Form submit ──
  function handleSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const attendees = document.getElementById('attendees').value;
    const phone = document.getElementById('phone').value.trim();
    const note = document.getElementById('note').value.trim();

    if (!name || !attendees || !phone) {
      showToast('請填寫所有必填欄位', false);
      return false;
    }

    if (GOOGLE_SCRIPT_URL.includes('請貼上')) {
      showToast('尚未設定 Google Sheets 連結，請聯繫管理員', false);
      return false;
    }

    const btn = document.querySelector('.submit-btn');
    btn.textContent = '報名中⋯';
    btn.disabled = true;

    const formData = new FormData();
    formData.append('name', name);
    formData.append('attendees', attendees);
    formData.append('phone', phone);
    formData.append('note', note);

    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: formData })
    .then(() => {
      showToast(`${name}，報名成功！期待與你相見`, true);
      btn.textContent = '已完成報名 ✓';
      btn.style.background = 'linear-gradient(135deg, #5B8C6E, #4A7A5D)';
      btn.style.color = '#fff';
      document.getElementById('reunionForm').reset();
    })
    .catch(() => {
      showToast('報名失敗，請稍後再試或聯繫主辦人', false);
      btn.textContent = '確認報名';
      btn.disabled = false;
    });

    return false;
  }

  // ── Welcome overlay & autoplay ──
  const bgMusic = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  const musicLabel = document.getElementById('musicLabel');
  let isPlaying = false;

  function enterSite() {
    // Hide overlay
    document.getElementById('welcomeOverlay').classList.add('hide');

    // Autoplay music
    bgMusic.volume = 0.4;
    bgMusic.play().then(() => {
      isPlaying = true;
      musicBtn.classList.add('playing');
      musicLabel.textContent = '播放中';
      musicLabel.classList.add('show');
      setTimeout(() => musicLabel.classList.remove('show'), 3000);
    }).catch((err) => {
      console.log('音樂播放失敗:', err);
    });
  }

  function toggleMusic() {
    if (isPlaying) {
      bgMusic.pause();
      musicBtn.classList.remove('playing');
      isPlaying = false;
      musicLabel.textContent = '音樂已暫停';
    } else {
      bgMusic.volume = 0.4;
      bgMusic.play().then(() => {
        musicBtn.classList.add('playing');
        isPlaying = true;
        musicLabel.textContent = '播放中';
      }).catch(() => {});
    }
    musicLabel.classList.add('show');
    setTimeout(() => musicLabel.classList.remove('show'), 2000);
  }

  function showToast(msg, success) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = success ? '#5B8C6E' : '#C0392B';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>

</body>
</html>
